<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Page</title>
    <link rel="stylesheet" href="style/race_page.css">
</head>
<body>
    <div class="container">
        <div class="col-1">
            <div class="text-box">
                <h1>Race Name</h1>
                <h3>race details</h3>
            </div>

            <div class="btu-box">
                <button type="button">dashboard</button>
                <button type="button">start race</button>
            </div>
        </div>

        <div class="col-2">
            <div class="menu">
                <button type="button">การแข่ง</button>
                <button type="button">ทีม</button>
                <button type="button">บันทึก</button>
            </div>

            <div class="show-detail">
                <table>
                    <tr>
                        <th>No</th>
                        <th>Name</th>
                    </tr>

                    <tr>
                        <td>1</td>
                        <td>มะม่วง</td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>ทุเรียน</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
