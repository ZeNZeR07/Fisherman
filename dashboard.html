<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background: #d8d8d8;
        min-height: 100vh;
        display: flex;
        justify-content: center;
    }

    .container{
        width: 80%;
        margin-top: 30px;
    }

    /* HEAD */
    .col-1{
        text-align: center;
        margin-bottom: 40px;
    }

    .col-1 h1{
        font-size: 42px;
        font-weight: bold;
        color: #222;
    }

    /* MENU */
    .menu{
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .boxmenu{
        display: flex;
        gap: 25px;
    }

    .boxmenu button{
        width: 80px;
        height: 28px;
        border: none;
        border-radius: 20px;
        background: #9cb5bc;
        color: aliceblue;
        cursor: pointer;
    }

    .add-btn{
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 50%;
        background: #9cb5bc;
        color: white;
        font-size: 28px;
        cursor: pointer;
    }

    /* TABLE */
    .border{
        width: 100%;
        min-height: 450px;
        background: #cfcfcf;
    }

    table{
        width: 100%;
        border-collapse: collapse;
    }

    th{
        background: #9f9ba5;
        color: white;
        padding: 15px;
        font-size: 20px;
    }

    td{
        height: 350px;
    }
</style>

<body>
    <div class="container">
        <div class="col-1">
            <h1>FISHER MAN</h1>
        </div>
        <div class="col-2">
            <div class="menu">
                <div class="boxmenu">
                    <button type="button">btn1</button>
                    <button type="button">btn2</button>
                </div>
                <button type="button" class="add-btn">+</button>
            </div>

            <div class="border">
                <table>
                    <tr>
                        <th>NO</th>
                        <th>TEAM NAME</th>
                        <th>DATE</th>
                    </tr>
                    <tr>
                        <td></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
